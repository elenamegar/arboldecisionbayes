<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Árbol Oculto · Árboles de Decisión + Bayes</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070b18;--bg2:#0f172a;--card:#111827;--bdr:#1f2937;
  --txt:#e2e8f0;--dim:#374151;--muted:#64748b;
  --gold:#fbbf24;--red:#ef4444;--green:#10b981;--blue:#3b82f6;--purple:#a855f7;
}
body{font-family:'Rajdhani','Trebuchet MS',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
.bb{font-family:'Bebas Neue',Impact,serif;letter-spacing:.05em}
.mono{font-family:'Space Mono','Courier New',monospace}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .35s ease both}

/* SVG reveal */
.hel{opacity:0;transition:opacity .6s ease}
.sel{opacity:1}

.btn{font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.04em;border:none;cursor:pointer;border-radius:5px;transition:all .2s;font-size:.88rem;padding:9px 16px;display:inline-flex;align-items:center;gap:6px}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:translateY(0)}
.btn[disabled]{opacity:.4;cursor:default;transform:none}
.bgold{background:var(--gold);color:#060a14}
.bgold:hover{background:#f59e0b;box-shadow:0 0 16px rgba(251,191,36,.4)}
.boutline{background:transparent;color:var(--gold);border:1px solid var(--gold)}
.boutline:hover{background:rgba(251,191,36,.1)}
.bghost{background:rgba(255,255,255,.04);color:#94a3b8;border:1px solid var(--bdr)}
.bghost:hover{background:rgba(255,255,255,.09);color:var(--txt)}
.bghost.on{background:rgba(251,191,36,.12);color:var(--gold);border-color:rgba(251,191,36,.4)}
.bgreen{background:var(--green);color:#060a14}
.bgreen:hover{background:#059669;box-shadow:0 0 14px rgba(16,185,129,.35)}
.bpurple{background:var(--purple);color:white}
.bpurple:hover{background:#9333ea}

.card{background:var(--card);border:1px solid var(--bdr);border-radius:9px;padding:20px}
.hcard{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:24px;cursor:pointer;transition:all .25s}
.hcard:hover{border-color:var(--gold);background:#14203a;transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.4)}
.inp{background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-family:'Rajdhani',sans-serif;font-size:.93rem;padding:10px 14px;width:100%;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--dim)}

#topbar{background:rgba(7,11,24,.95);border-bottom:1px solid var(--bdr);padding:10px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);flex-wrap:wrap}
.sbadge{display:inline-flex;align-items:center;gap:8px;background:var(--bg2);padding:5px 12px;border-radius:6px;border:1px solid var(--bdr);transition:border-color .3s}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;flex-shrink:0}

#quiz-layout{display:grid;grid-template-columns:1fr 340px;height:calc(100vh - 52px)}
#tree-panel{background:var(--bg2);border-right:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden}
#right-panel{display:flex;flex-direction:column;overflow-y:auto}
#progress-bar{height:4px;background:var(--bdr);flex-shrink:0}
#progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),#f59e0b);transition:width .5s ease}
#qbox{padding:14px 16px;flex:1;overflow-y:auto}
#score-section{padding:12px 16px;border-top:1px solid var(--bdr);flex-shrink:0}
#ctrl-bar{padding:12px 16px;border-top:1px solid var(--bdr);flex-shrink:0}

.phase-tag{font-size:.64rem;letter-spacing:.18em;font-weight:700;padding:3px 9px;border-radius:100px;display:inline-block;margin-bottom:8px}
.step-counter{font-size:.74rem;color:var(--muted);font-weight:600}
.q-text{font-size:.92rem;line-height:1.6;color:var(--txt);font-weight:600;margin-bottom:12px}
.q-opt{background:rgba(255,255,255,.04);border:1px solid var(--bdr);border-radius:6px;padding:9px 13px;cursor:pointer;transition:all .18s;font-size:.86rem;font-weight:600;text-align:left;width:100%;color:var(--txt);font-family:'Rajdhani',sans-serif;display:block;margin-bottom:6px}
.q-opt:hover{border-color:var(--gold);background:rgba(251,191,36,.07)}
.q-opt.correct{background:rgba(16,185,129,.15);border-color:var(--green);color:var(--green)}
.q-opt.wrong{background:rgba(239,68,68,.08);border-color:var(--red);color:var(--red);opacity:.55}
.q-opt[disabled]{cursor:default}

.explain-box{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.25);border-radius:6px;padding:10px;font-size:.8rem;line-height:1.5;color:#93c5fd;margin:8px 0}
.bayes-box{background:rgba(168,85,247,.07);border:1px solid rgba(168,85,247,.25);border-radius:6px;padding:10px;font-size:.78rem;line-height:1.5;margin:6px 0}
.formula-box{background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);border-radius:5px;padding:8px;margin:6px 0;font-family:'Space Mono',monospace;font-size:.75rem;color:#fbbf24}
.team-btn{width:100%;padding:8px 14px;border-radius:5px;border:1px solid;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.86rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;transition:all .2s}
.lbl{font-size:.66rem;letter-spacing:.2em;color:var(--dim);font-weight:700;margin-bottom:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:780px){.g2,.g3{grid-template-columns:1fr}#quiz-layout{grid-template-columns:1fr}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:#374151;border-radius:3px}
</style>
</head>

// ─── STATE ────────────────────────────────────────────────────────────────────
const S={
  screen:'setup',teams:[],tinputs:['Equipo A','Equipo B','',''],lastPt:-1,
  treeIdx:0,quizStep:-1,revealed:new Set(),answered:false,selectedOpt:-1
};

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function go(s){S.screen=s;render();}
function startSession(){
  const v=S.tinputs.filter(n=>n.trim()).map((n,i)=>({name:n.trim(),score:0,color:COLORS[i]}));
  if(v.length<2){alert('Necesitas al menos 2 equipos');return;}
  S.teams=v;go('hub');
}
function addPt(i){
  S.teams[i].score++;S.lastPt=i;render();
  setTimeout(()=>{S.lastPt=-1;render();},1800);
}
function startTree(idx){
  S.treeIdx=idx;S.quizStep=-1;S.revealed=new Set();S.answered=false;S.selectedOpt=-1;
  go('quiz');
}
function advanceQuiz(){
  const tree=TREES[S.treeIdx];
  if(S.quizStep<tree.steps.length-1){S.quizStep++;S.answered=false;S.selectedOpt=-1;render();}
  else go('summary');
}
function selectOpt(i){
  if(S.answered)return;
  const step=TREES[S.treeIdx].steps[S.quizStep];
  S.selectedOpt=i;S.answered=true;
  step.reveal.forEach(id=>S.revealed.add(id));
  render();
  setTimeout(()=>{S.revealed.forEach(id=>{const el=document.getElementById(id);if(el){el.classList.remove('hel');el.classList.add('sel');}});},30);
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function teamBtns(){
  return S.teams.map((t,i)=>`
    <button class="team-btn" onclick="addPt(${i})" style="background:${S.lastPt===i?t.color:'rgba(255,255,255,.04)'};color:${S.lastPt===i?'#060a14':'var(--txt)'};border-color:${t.color}">
      <span style="display:flex;align-items:center;gap:8px"><span class="dot" style="background:${t.color}"></span>${esc(t.name)}</span>
      <span class="mono" style="color:${S.lastPt===i?'#060a14':t.color}">${t.score}</span>
    </button>`).join('');
}
function topbar(title,icon){
  const sc=S.teams.map((t,i)=>`
    <div class="sbadge" style="border-color:${i===S.lastPt?t.color:'var(--bdr)'}">
      <span class="dot" style="background:${t.color}"></span>
      <span style="font-weight:700;font-size:.8rem">${esc(t.name)}</span>
      <span class="mono" style="color:${t.color};font-weight:700">${t.score}</span>
    </div>`).join('');
  return `<div id="topbar"><button class="btn bghost" onclick="go('hub')">← Menú</button><span style="color:#374151">|</span><span style="font-weight:700;color:#94a3b8;font-size:.86rem">${icon} ${title}</span><div style="flex:1"></div><div style="display:flex;gap:8px;flex-wrap:wrap">${sc}</div></div>`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const pages={setup:pageSetup,hub:pageHub,quiz:pageQuiz,summary:pageSummary,podio:pagePodio};
  document.getElementById('root').innerHTML=(pages[S.screen]||pageHub)();
  setTimeout(()=>{S.revealed.forEach(id=>{const el=document.getElementById(id);if(el){el.classList.remove('hel');el.classList.add('sel');}});},20);
}

      <div class="bb" style="font-size:1.15rem;margin-bottom:6px;color:#f1f5f9">${tree.name}</div>
      <p style="color:var(--muted);font-size:.82rem;line-height:1.5;margin-bottom:12px">El árbol aparece pieza a pieza mientras los equipos resuelven cada etapa.</p>
      <span style="display:inline-block;padding:3px 10px;border-radius:100px;background:rgba(${tree.color==='#10b981'?'16,185,129':tree.color==='#3b82f6'?'59,130,246':'168,85,247'},.1);color:${tree.color};font-size:.64rem;font-weight:700;letter-spacing:.1em">${tree.difficulty}</span>
    </div>`).join('');
  return `<div style="min-height:100vh">
    <div style="padding:18px 22px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bdr);flex-wrap:wrap;gap:12px">
      <div>
        <h1 class="bb" style="font-size:1.8rem;color:#f1f5f9">EL ÁRBOL <span style="color:var(--green)">OCULTO</span></h1>
        <p style="color:#475569;font-size:.72rem;margin-top:2px;letter-spacing:.1em">ÁRBOLES DE DECISIÓN · PROB. CONDICIONADA · BAYES</p>
      </div>
      <button class="btn bghost" onclick="go('podio')">🏆 Podio</button>
    </div>
    <div style="padding:24px 22px">
      <div class="lbl">MARCADOR EN VIVO</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px">${sc}</div>
      <div class="lbl">SELECCIONAR ÁRBOL — EL ÁRBOL EMPIEZA VACÍO</div>
      <div class="g3" style="max-width:860px;margin-bottom:20px">${cards}</div>
      <div class="card" style="max-width:860px;background:rgba(168,85,247,.04);border-color:rgba(168,85,247,.2)">
        <p style="font-size:.68rem;letter-spacing:.16em;color:var(--purple);font-weight:700;margin-bottom:8px">📖 CÓMO FUNCIONA</p>
        <p style="color:#94a3b8;font-size:.86rem;line-height:1.65">Proyectas el árbol vacío. En cada paso aparece una pregunta — los equipos discuten 30 segundos y responden. El profesor selecciona la opción correcta → el árbol se revela poco a poco. El árbol 3 incluye la tabla de Bayes completa para ver cómo se actualizan las probabilidades.</p>
      </div>
    </div>
  </div>`;
}

function pageQuiz(){
  const tree=TREES[S.treeIdx];
  const step=S.quizStep>=0?tree.steps[S.quizStep]:null;
  const total=tree.steps.length;
  const prog=S.quizStep>=0?Math.round((S.quizStep+1)/total*100):0;
  const isLast=S.quizStep===total-1;

  let rightContent='';
  if(S.quizStep===-1){
    rightContent=`<div id="qbox">
      <span class="phase-tag" style="background:rgba(${tree.color==='#a855f7'?'168,85,247':tree.color==='#10b981'?'16,185,129':'59,130,246'},.1);color:${tree.color}">🎭 ESCENARIO</span>
      <h3 class="bb" style="font-size:1.35rem;color:#f1f5f9;margin-bottom:12px">${tree.icon} ${tree.name}</h3>
      <p style="color:#94a3b8;font-size:.88rem;line-height:1.7;margin-bottom:18px">${tree.scenario}</p>
      <div style="background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);border-radius:7px;padding:12px;margin-bottom:18px">
        <p style="font-size:.68rem;letter-spacing:.15em;color:var(--gold);font-weight:700;margin-bottom:4px">💡 RETO INICIAL</p>
        <p style="color:#e2e8f0;font-size:.86rem;line-height:1.5">¿Qué decisión tomaríais? Discutidlo 30 segundos antes de continuar.</p>
      </div>
      <button class="btn bgreen" style="width:100%;justify-content:center;font-size:.93rem;padding:12px" onclick="advanceQuiz()">▶ Comenzar el Quiz →</button>
    </div>`;
  } else {
    const opts=step.opts.map((o,i)=>{
      let cls='q-opt';
      if(S.answered){cls+=i===step.correct?' correct':' wrong';}
      return `<button class="${cls}" onclick="selectOpt(${i})" ${S.answered?'disabled':''}>${String.fromCharCode(65+i)}. ${o}</button>`;
    }).join('');
    const nextBtn=S.answered
      ?`<button class="btn ${isLast?'bgold':'bgreen'}" style="width:100%;justify-content:center;padding:11px;margin-top:10px" onclick="advanceQuiz()">${isLast?'🏆 Ver Resumen →':'▶ Siguiente paso →'}</button>`
      :`<button class="btn bghost" style="width:100%;justify-content:center;padding:11px;margin-top:10px;opacity:.4" disabled>Responde primero ↑</button>`;

    rightContent=`<div id="qbox">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span class="phase-tag" style="background:rgba(${step.tagColor==='#fbbf24'?'251,191,36':step.tagColor==='#10b981'?'16,185,129':step.tagColor==='#a855f7'?'168,85,247':'59,130,246'},.1);color:${step.tagColor}">${step.tag}</span>
        <span class="step-counter">Paso ${S.quizStep+1}/${total}</span>
      </div>
      <p class="q-text">${step.q}</p>
      ${opts}
      ${S.answered?`<div class="explain-box">💡 ${step.explain}</div>`:''}
      ${nextBtn}
    </div>`;
  }

  const scoreBlock=S.answered&&S.quizStep>=0?`<div id="score-section"><div class="lbl">+ PUNTO AL EQUIPO QUE RESPONDIÓ BIEN</div>${teamBtns()}</div>`:`<div id="score-section" style="opacity:.4;pointer-events:none"><div class="lbl">+ PUNTO AL EQUIPO QUE RESPONDIÓ BIEN</div>${teamBtns()}</div>`;

  return `<div style="display:flex;flex-direction:column;height:100vh">
    ${topbar(tree.name,tree.icon)}
    <div id="quiz-layout">
      <div id="tree-panel">${tree.svg}</div>
      <div id="right-panel">
        <div id="progress-bar"><div id="progress-fill" style="width:${prog}%"></div></div>
        ${rightContent}
        ${scoreBlock}
      </div>
    </div>
  </div>`;
}

function pageSummary(){
  const tree=TREES[S.treeIdx];
  const sorted=[...S.teams].sort((a,b)=>b.score-a.score);
  const medals=['🥇','🥈','🥉'];
  const rows=sorted.map((t,i)=>`
    <div style="display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid ${i===0?t.color:'var(--bdr)'};border-left:4px solid ${t.color};border-radius:8px;padding:12px 18px;margin-bottom:8px">
      <span style="font-size:1.5rem">${medals[i]||'🎖'}</span>
      <div style="flex:1"><div style="font-weight:700">${esc(t.name)}</div></div>
      <div class="mono" style="font-size:1.75rem;color:${t.color};font-weight:700">${t.score}</div>
      <div style="color:var(--muted);font-size:.74rem">pts</div>
    </div>`).join('');
  const nextIdx=S.treeIdx+1;
  return `<div style="min-height:100vh">${topbar('Resultados','📊')}
    <div style="max-width:700px;margin:0 auto;padding:28px 22px" class="fu">
      <p class="bb" style="font-size:.78rem;letter-spacing:.25em;color:var(--green);margin-bottom:6px">ÁRBOL COMPLETADO ✓</p>
      <h2 class="bb" style="font-size:1.9rem;color:#f1f5f9;margin-bottom:22px">${tree.icon} ${tree.name}</h2>
      <div class="lbl">CLASIFICACIÓN DE ESTA RONDA</div>
      <div style="margin-bottom:22px">${rows}</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn bgreen" onclick="go('hub')">← Menú</button>
        ${nextIdx<TREES.length?`<button class="btn boutline" onclick="startTree(${nextIdx})">Siguiente → ${TREES[nextIdx].icon} ${TREES[nextIdx].name}</button>`:''}
        <button class="btn bghost" onclick="go('podio')">🏆 Podio final</button>
      </div>
    </div>
  </div>`;
}

function pagePodio(){
  const sorted=[...S.teams].sort((a,b)=>b.score-a.score);
  const medals=['🥇','🥈','🥉'];
  const rows=sorted.map((t,i)=>`
    <div class="fu" style="display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid ${i===0?t.color:'var(--bdr)'};border-left:4px solid ${t.color};border-radius:10px;padding:16px 20px;margin-bottom:10px;animation-delay:${i*.1}s;box-shadow:${i===0?'0 0 20px rgba(16,185,129,.18)':'none'}">
      <span style="font-size:1.6rem">${medals[i]||'🎖'}</span>
      <div style="flex:1"><div class="bb" style="font-size:1.25rem;color:#f1f5f9">${esc(t.name)}</div><div style="color:var(--muted);font-size:.74rem">Posición #${i+1}</div></div>
      <div class="mono" style="font-size:1.9rem;color:${t.color};font-weight:700">${t.score}</div>
      <div style="color:#475569;font-size:.72rem">pts</div>
    </div>`).join('');
  return `<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 22px">
    <div class="fu" style="text-align:center;margin-bottom:38px">
      <p style="font-size:.7rem;letter-spacing:.3em;color:var(--green);font-weight:700;margin-bottom:6px">FIN DE LA SESIÓN</p>
      <h1 class="bb" style="font-size:clamp(2.8rem,8vw,5rem);color:#f1f5f9">PODIO <span style="color:var(--green)">FINAL</span></h1>
    </div>
    <div style="width:100%;max-width:520px;margin-bottom:28px">${rows}</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
      <button class="btn bgreen" onclick="go('hub')">← Volver al menú</button>
      <button class="btn bghost" onclick="S.teams=S.teams.map(t=>({...t,score:0}));go('hub')">↺ Reiniciar</button>
      <button class="btn bghost" onclick="go('setup')">⚙ Nueva sesión</button>
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
